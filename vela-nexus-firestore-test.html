<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vela Nexus — Firestore Connection Test</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: #131a22;
    --line: #1f2a36;
    --text: #e6edf3;
    --muted: #8b98a5;
    --ok: #2ea043;
    --warn: #d29922;
    --err: #f85149;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: 0.2px;
  }
  .sub {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    flex: 1 1 0;
    min-width: 140px;
    padding: 16px 12px;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    background: #1f6feb;
    border: 1px solid #2f81f7;
    border-radius: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button.secondary {
    background: #21262d;
    border-color: #30363d;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .status {
    margin-top: 16px;
    padding: 24px 16px;
    border-radius: 12px;
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.4px;
    background: #0d1117;
    border: 1px solid var(--line);
    color: var(--muted);
    word-break: break-word;
  }
  .status.ok { color: var(--ok); border-color: #1f6f3a; background: #0c2014; }
  .status.warn { color: var(--warn); border-color: #6f5a1a; background: #1f180c; }
  .status.err { color: var(--err); border-color: #6f1f1f; background: #1f0c0c; }
  .meta {
    margin-top: 12px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }
  .meta code {
    color: var(--accent);
    background: #0d1117;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
  }
  .log {
    margin-top: 8px;
    padding: 12px;
    background: #0d1117;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: pre-wrap;
    max-height: 240px;
    overflow-y: auto;
  }
  .label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Vela Nexus — Firestore Test</h1>
  <div class="sub">project: vela-nexus / collection: conn_test</div>

  <div class="card">
    <div class="label">Action</div>
    <div class="row">
      <button id="btnWrite">쓰기 테스트</button>
      <button id="btnRead" class="secondary" disabled>읽기 테스트</button>
    </div>
    <div id="status" class="status">READY</div>
    <div class="meta">
      Last doc id: <code id="lastDocId">—</code><br/>
      Timeout: 10s · Mode: test rules (no auth)
    </div>
  </div>

  <div class="card">
    <div class="label">Log</div>
    <div id="log" class="log">waiting…</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDMl0_dChzpDbMA0VmLFCGwSvqxbwTE8lw",
    authDomain: "vela-nexus.firebaseapp.com",
    projectId: "vela-nexus",
    storageBucket: "vela-nexus.firebasestorage.app",
    messagingSenderId: "225703223019",
    appId: "1:225703223019:web:14d6763aa9469933f128ae"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const $status = document.getElementById("status");
  const $log = document.getElementById("log");
  const $lastDocId = document.getElementById("lastDocId");
  const $btnWrite = document.getElementById("btnWrite");
  const $btnRead = document.getElementById("btnRead");

  let lastDocId = null;

  function setStatus(text, kind) {
    $status.textContent = text;
    $status.className = "status" + (kind ? " " + kind : "");
  }
  function log(line) {
    const ts = new Date().toISOString().replace("T", " ").slice(0, 19);
    $log.textContent = `[${ts}] ${line}\n` + $log.textContent;
  }
  function withTimeout(promise, ms, tag) {
    return Promise.race([
      promise,
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error(`TIMEOUT_${ms / 1000}s@${tag}`)), ms)
      )
    ]);
  }

  $btnWrite.addEventListener("click", async () => {
    $btnWrite.disabled = true;
    $btnRead.disabled = true;
    setStatus("WRITING…", "warn");
    const docId = String(Date.now());
    log(`write start → conn_test/${docId}`);
    try {
      await withTimeout(
        setDoc(doc(db, "conn_test", docId), {
          ts: docId,
          ok: true,
          serverTs: serverTimestamp(),
          ua: navigator.userAgent
        }),
        10000,
        "write"
      );
      lastDocId = docId;
      $lastDocId.textContent = docId;
      setStatus("SUCCESS", "ok");
      log(`write ok → conn_test/${docId}`);
      $btnRead.disabled = false;
    } catch (e) {
      const msg = String(e && e.message ? e.message : e);
      if (msg.startsWith("TIMEOUT_")) {
        setStatus("TIMEOUT_10s", "err");
      } else {
        setStatus("ERROR: " + msg, "err");
      }
      log(`write fail → ${msg}`);
    } finally {
      $btnWrite.disabled = false;
    }
  });

  $btnRead.addEventListener("click", async () => {
    if (!lastDocId) {
      setStatus("ERROR: no doc to read", "err");
      return;
    }
    $btnRead.disabled = true;
    $btnWrite.disabled = true;
    setStatus("READING…", "warn");
    log(`read start ← conn_test/${lastDocId}`);
    try {
      const snap = await withTimeout(
        getDoc(doc(db, "conn_test", lastDocId)),
        10000,
        "read"
      );
      if (!snap.exists()) {
        setStatus("ERROR: doc missing", "err");
        log(`read fail → doc missing`);
      } else {
        const data = snap.data();
        setStatus("SUCCESS", "ok");
        log(`read ok ← ${JSON.stringify(data)}`);
      }
    } catch (e) {
      const msg = String(e && e.message ? e.message : e);
      if (msg.startsWith("TIMEOUT_")) {
        setStatus("TIMEOUT_10s", "err");
      } else {
        setStatus("ERROR: " + msg, "err");
      }
      log(`read fail → ${msg}`);
    } finally {
      $btnRead.disabled = false;
      $btnWrite.disabled = false;
    }
  });

  log("init ok · project=vela-nexus");
</script>
</body>
</html>
